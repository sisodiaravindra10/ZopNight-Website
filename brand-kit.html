<!DOCTYPE html>
<!--
  ============================================================================
  ZopDev · brand-kit.html
  ----------------------------------------------------------------------------
  All-in-one asset creation tool for the team. 18 templates across social,
  marketing, video, and document formats. Edit fields, see live preview,
  click Export → PNG downloads at the template's native resolution.
  Bulk-export all templates as a ZIP. Press kit for SVG + PNG marks.

  No backend, no build. Uses html-to-image + JSZip via CDN. Brand colors
  and fonts come from homepage-chrome.css so output stays on-brand.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>

<title>Brand kit · ZopDev</title>
<meta name="description" content="Download on-brand assets, LinkedIn covers, X banners, Zoom backgrounds, email signatures, OG cards, press logos. All editable, all PNG-exportable."/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="homepage-chrome.css"/>

<style>
/* no-italic-site-wide */ em,i,cite,dfn,var,address,blockquote{font-style:normal}

/* ============================================================================
   BRAND-KIT TOOL LAYOUT
   ============================================================================ */
body{ overflow:hidden; }   /* tool fills viewport · no page scroll */
.nav{ display:none; }      /* hide site nav; this is an internal tool */

.bk-shell{
  position:fixed; inset:0; top:0;
  display:grid; grid-template-columns:240px 1fr 320px;
  grid-template-rows:auto 1fr;
  font-family:var(--font);
}

.bk-header{
  grid-column:1 / -1;
  display:flex; align-items:center; gap:24px;
  padding:14px 24px;
  border-bottom:1px solid var(--line);
  background:var(--paper);
}
.bk-header .brand{
  display:flex; align-items:center; gap:10px;
  font-family:var(--font); font-weight:700; font-size:14px;
  color:var(--ink); text-decoration:none; letter-spacing:-.01em;
}
.bk-header .brand svg{ width:24px; height:24px; }
.bk-header .meta{
  font-family:var(--mono); font-size:11px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--g-600);
  display:flex; align-items:center; gap:8px;
}
.bk-header .meta::before{ content:''; width:8px; height:8px; background:var(--zop-orange); }
.bk-header .current{
  margin-left:auto; font-family:var(--mono); font-size:11px;
  color:var(--g-600); letter-spacing:.04em;
}
.bk-header .current strong{ color:var(--ink); font-weight:700; }
.bk-export{
  font-family:var(--mono); font-size:12px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  background:var(--zop-orange); color:#0a0a0c;
  border:1px solid var(--zop-orange);
  padding:10px 18px; cursor:pointer;
  transition:transform var(--dur-med) var(--ease-out), box-shadow var(--dur-med) var(--ease-out);
}
.bk-export:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 0 -3px var(--ink);
}
.bk-export:disabled{ opacity:.5; cursor:wait; }
.bk-export-alt{
  background:transparent; color:var(--ink); border:1px solid var(--ink);
}
.bk-export-alt:hover{
  background:var(--ink); color:var(--paper);
}
.bk-tcat{
  font-family:var(--mono); font-size:9px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:var(--g-500);
  padding:14px 22px 6px; margin:0;
  border-top:1px solid var(--line);
}
.bk-tcat:first-of-type{ border-top:0; }

/* ─── Left sidebar · template list ─── */
.bk-templates{
  border-right:1px solid var(--line);
  overflow-y:auto;
  background:var(--paper);
}
.bk-templates h3{
  font-family:var(--mono); font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; color:var(--g-600);
  padding:18px 22px 10px; margin:0;
}
.bk-tmpl-btn{
  display:block; width:100%; text-align:left;
  padding:14px 22px;
  background:transparent; border:0;
  border-bottom:1px dashed var(--line);
  font-family:var(--font); font-size:13px;
  color:var(--ink); cursor:pointer;
  transition:background .15s var(--ease-out);
}
.bk-tmpl-btn:hover{ background:var(--g-50); }
.bk-tmpl-btn.active{
  background:var(--ink); color:var(--paper);
  border-bottom-color:var(--ink);
}
.bk-tmpl-btn .label{ display:block; font-weight:600; margin-bottom:2px; }
.bk-tmpl-btn .dim{
  display:block; font-family:var(--mono); font-size:10px;
  letter-spacing:.06em; color:var(--g-500);
}
.bk-tmpl-btn.active .dim{ color:rgba(240,235,219,.6); }

/* ─── Center · preview stage ─── */
.bk-preview{
  position:relative;
  background:repeating-linear-gradient(45deg, #ECE7D7 0 1px, transparent 1px 12px), var(--paper);
  overflow:auto;
  display:flex; align-items:center; justify-content:center;
  padding:32px;
}
html[data-theme="dark"] .bk-preview{
  background:repeating-linear-gradient(45deg, #1e1e22 0 1px, transparent 1px 12px), var(--paper);
}
.bk-stage{
  position:relative;
  display:flex; align-items:center; justify-content:center;
}
/* Live preview wraps the native-sized template and visually scales it down */
.bk-tmpl-wrap{
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  background:#FAF7EC;          /* fallback so transparent areas show */
  outline:1px solid var(--line);
  overflow:hidden;
}
.bk-tmpl{
  position:absolute; top:0; left:0;
  transform-origin:top left;
}

/* ─── Right · editor panel ─── */
.bk-editor{
  border-left:1px solid var(--line);
  background:var(--paper);
  overflow-y:auto;
  padding:0 0 80px;
}
.bk-editor h3{
  font-family:var(--mono); font-size:10px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; color:var(--g-600);
  padding:18px 22px 10px; margin:0;
}
.bk-field{
  padding:10px 22px;
  border-bottom:1px dashed var(--line);
}
.bk-field label{
  display:block; font-family:var(--mono); font-size:10px;
  letter-spacing:.12em; text-transform:uppercase; color:var(--g-700);
  font-weight:600; margin-bottom:6px;
}
.bk-field input[type="text"],
.bk-field textarea{
  width:100%;
  padding:9px 12px;
  font-family:var(--font); font-size:14px;
  color:var(--ink); background:transparent;
  border:1px solid var(--line);
  outline:none;
  transition:border-color var(--dur-fast) var(--ease-out);
}
.bk-field input[type="text"]:focus,
.bk-field textarea:focus{ border-color:var(--zop-orange); }
.bk-field textarea{ resize:vertical; min-height:64px; line-height:1.5; }
.bk-field .seg-row{
  display:grid; grid-auto-flow:column; grid-auto-columns:1fr;
  border:1px solid var(--line);
}
.bk-field .seg{
  font-family:var(--mono); font-size:10px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  padding:8px 4px;
  background:transparent; color:var(--g-700);
  border:0; border-right:1px solid var(--line); cursor:pointer;
}
.bk-field .seg:last-child{ border-right:0; }
.bk-field .seg.active{ background:var(--ink); color:var(--paper); }
.bk-field input[type="color"]{
  width:60px; height:36px; padding:0; border:1px solid var(--line);
  background:transparent; cursor:pointer;
}
.bk-field .swatch-row{
  display:flex; gap:8px; flex-wrap:wrap;
}
.bk-field .swatch{
  width:32px; height:32px; cursor:pointer;
  border:1px solid var(--line);
  transition:transform var(--dur-fast) var(--ease-out);
}
.bk-field .swatch:hover{ transform:scale(1.1); }
.bk-field .swatch.active{
  outline:2px solid var(--ink); outline-offset:2px;
}
.bk-field .help{
  font-family:var(--mono); font-size:10px; color:var(--g-500);
  letter-spacing:.04em; margin-top:6px; line-height:1.4;
}
/* ─── Range slider · for mark padding, image opacity ─── */
.bk-field input[type="range"]{
  width:100%; appearance:none; -webkit-appearance:none;
  background:transparent; height:24px; cursor:pointer;
}
.bk-field input[type="range"]::-webkit-slider-runnable-track{
  height:2px; background:var(--line);
}
.bk-field input[type="range"]::-webkit-slider-thumb{
  appearance:none; -webkit-appearance:none;
  width:14px; height:14px; background:var(--zop-orange);
  border:0; margin-top:-6px; cursor:pointer;
}
.bk-field input[type="range"]::-moz-range-track{ height:2px; background:var(--line); }
.bk-field input[type="range"]::-moz-range-thumb{
  width:14px; height:14px; background:var(--zop-orange);
  border:0; cursor:pointer;
}
.bk-field .range-row{ display:flex; align-items:center; gap:10px; }
.bk-field .range-val{
  font-family:var(--mono); font-size:11px; font-weight:600;
  color:var(--g-700); min-width:48px; text-align:right;
  font-variant-numeric:tabular-nums;
}
/* ─── File upload · custom-styled "Upload" pill that wraps a hidden
   <input type="file">. Sits next to a Clear button so swap-and-remove
   feels like a single control. ─── */
.bk-field .file-row{ display:flex; gap:8px; align-items:center; }
.bk-field .file-pill{
  font-family:var(--mono); font-size:10px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  padding:8px 12px; cursor:pointer;
  background:var(--ink); color:var(--paper);
  border:1px solid var(--ink);
  display:inline-flex; align-items:center; gap:6px;
  transition:background var(--dur-fast) var(--ease-out);
}
.bk-field .file-pill:hover{ background:var(--zop-orange); border-color:var(--zop-orange); color:#0a0a0c; }
.bk-field .file-pill input[type="file"]{
  position:absolute; left:-9999px; opacity:0; width:0; height:0;
}
.bk-field .file-clear{
  font-family:var(--mono); font-size:10px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  padding:8px 12px; cursor:pointer;
  background:transparent; color:var(--ink);
  border:1px solid var(--line);
  transition:border-color var(--dur-fast) var(--ease-out);
}
.bk-field .file-clear:hover{ border-color:var(--ink); }
.bk-field .file-name{
  flex:1; font-family:var(--mono); font-size:10px;
  color:var(--g-600); letter-spacing:.04em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
/* ─── Carousel slide navigator · sits at the top of the editor when a
   carousel template is active. Numbered chips switch the active slide,
   "+" appends a new slide (capped at 10), "×" deletes the active one
   (disabled when only one slide remains). ─── */
.cs-strip{
  display:flex; flex-wrap:wrap; gap:6px; padding:4px 0;
}
.cs-chip, .cs-add, .cs-del{
  width:36px; height:36px;
  font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center;
  background:transparent; color:var(--ink);
  border:1px solid var(--line);
  cursor:pointer;
  transition:border-color var(--dur-fast) var(--ease-out),
             background  var(--dur-fast) var(--ease-out),
             color       var(--dur-fast) var(--ease-out);
  font-variant-numeric:tabular-nums;
}
.cs-chip:hover, .cs-add:hover, .cs-del:hover{ border-color:var(--ink); }
.cs-chip.active{
  background:var(--ink); color:var(--paper); border-color:var(--ink);
}
.cs-chip[data-cs-type="cover"]::after,
.cs-chip[data-cs-type="end"]::after{
  /* Tiny accent dot to visually distinguish cover / end slides from
     the run of content slides, the chip number alone reads flat. */
  content:''; position:absolute; transform:translate(13px, 13px);
  width:5px; height:5px; background:var(--zop-orange);
}
.cs-chip{ position:relative; }
.cs-add{ border-style:dashed; }
.cs-add:hover{ border-color:var(--zop-orange); color:var(--zop-orange); border-style:solid; }
.cs-add:disabled{ opacity:.35; cursor:not-allowed; }
.cs-del{ border-style:dashed; }
.cs-del:hover{ border-color:var(--zop-orange); color:var(--zop-orange); border-style:solid; }
.cs-del:disabled{ opacity:.35; cursor:not-allowed; }

/* ============================================================================
   TEMPLATE STYLES · each at native pixel dimensions, scaled for preview.
   The template dimensions match the platform's exact spec so PNG export
   lands at the right size for upload.
   ============================================================================ */

/* Shared template chrome */
.bk-tmpl{ font-family:var(--font); color:var(--ink); position:relative; }
.bk-tmpl .t-mark{
  /* Logo flush in the top-right corner by default · per-template sizes
     overridden below. Position can be repositioned via [data-mark-pos]
     and resized via [data-mark-size] / --mark-pad. */
  position:absolute; top:0; right:0;
  display:block; line-height:0;
  z-index:5;
  transform-origin: top right;
}
.bk-tmpl .t-mark svg{ display:block; }

/* ─── Mark position variants · transform-origin moves to whichever
   corner the mark anchors to so size scaling stays anchored, not
   centered. ─── */
.bk-tmpl[data-mark-pos="tl"] .t-mark{
  top:0; right:auto; bottom:auto; left:0;
  transform-origin:top left;
  margin: var(--mark-pad, 0) 0 0 var(--mark-pad, 0);
}
.bk-tmpl[data-mark-pos="tr"] .t-mark{
  top:0; right:0; bottom:auto; left:auto;
  transform-origin:top right;
  margin: var(--mark-pad, 0) var(--mark-pad, 0) 0 0;
}
.bk-tmpl[data-mark-pos="bl"] .t-mark{
  top:auto; right:auto; bottom:0; left:0;
  transform-origin:bottom left;
  margin: 0 0 var(--mark-pad, 0) var(--mark-pad, 0);
}
.bk-tmpl[data-mark-pos="br"] .t-mark{
  top:auto; right:0; bottom:0; left:auto;
  transform-origin:bottom right;
  margin: 0 var(--mark-pad, 0) var(--mark-pad, 0) 0;
}
.bk-tmpl[data-mark-pos="off"] .t-mark{ display:none; }

/* ─── Mark size scale · multiplier on top of each template's native
   mark size, so the size feels proportional in every template. ─── */
.bk-tmpl[data-mark-size="S"]   .t-mark{ transform:scale(0.50); }
.bk-tmpl[data-mark-size="M"]   .t-mark{ transform:scale(0.75); }
.bk-tmpl[data-mark-size="L"]   .t-mark{ transform:scale(1.00); }
.bk-tmpl[data-mark-size="XL"]  .t-mark{ transform:scale(1.30); }
.bk-tmpl[data-mark-size="XXL"] .t-mark{ transform:scale(1.65); }
/* Slack avatar's mark sits centered, not corner-anchored · scale from
   center for that one. */
#t-slack-avatar .t-mark{ transform-origin:center center !important; }

/* ─── Background image · sits at z-index 0 behind text. The text/mark
   layers above are forced to z-index 1+ so they remain legible. ─── */
.bk-tmpl .t-bg-img{
  position:absolute; inset:0; z-index:0;
  background-size:cover; background-position:center;
  background-repeat:no-repeat;
  pointer-events:none;
}
.bk-tmpl .t-bg-img[data-fit="contain"]{ background-size:contain; }
/* Optional dim layer · a flat ink overlay so legibility holds when the
   uploaded image is busy. Strength is set inline via --bg-dim. */
.bk-tmpl .t-bg-img::after{
  content:''; position:absolute; inset:0;
  background:#0A0A0A; opacity:var(--bg-dim, 0);
  pointer-events:none;
}

/* ─── Foreground asset · product shot, chart, illustration. Default
   right-side half-width. Other positions via [data-fg-pos]. ─── */
.bk-tmpl .t-fg-img{
  position:absolute; z-index:2;
  background-size:contain; background-repeat:no-repeat; background-position:center;
  pointer-events:none;
}
.bk-tmpl .t-fg-img[data-fg-pos="right"]{  top:0; right:0; bottom:0; width:50%; }
.bk-tmpl .t-fg-img[data-fg-pos="left"]{   top:0; left:0;  bottom:0; width:50%; }
.bk-tmpl .t-fg-img[data-fg-pos="center"]{ inset:8%; }
.bk-tmpl .t-fg-img[data-fg-pos="full"]{   inset:0; background-size:cover; }

/* ─── Stacking · when bg or fg image is present, raise text/mark so
   they paint above the absolutely-positioned image layers. Scoped via
   .has-img so it only kicks in when needed (the existing flex layouts
   in 18 templates aren't touched in the default case). ─── */
.bk-tmpl.has-img > :not(.t-bg-img):not(.t-fg-img):not(.t-mark){
  position:relative;
  z-index:1;
}

.bk-tmpl .t-name{ font-weight:700; letter-spacing:-.025em; white-space:pre-wrap; }
.bk-tmpl .t-tagline{ font-weight:400; color:var(--g-700); line-height:1.35; white-space:pre-wrap; }
/* On dark / drenched bg, tagline color inherits */
.bk-tmpl[data-bg="ink"] .t-tagline,
.bk-tmpl[data-bg="drench-blue"] .t-tagline,
.bk-tmpl[data-bg="drench-orange"] .t-tagline,
.bk-tmpl[data-bg="drench-green"] .t-tagline{ color:inherit; opacity:.85; }

/* Background variants */
.bk-tmpl[data-bg="paper"]{ background:#FAF7EC; color:#0A0A0A; }
.bk-tmpl[data-bg="ink"]{   background:#0A0A0A; color:#F0EBDB; }
.bk-tmpl[data-bg="ink"] .t-tagline{ color:rgba(240,235,219,.78); }
.bk-tmpl[data-bg="drench-blue"]{   background:#2A4494; color:#FAF7EC; }
.bk-tmpl[data-bg="drench-orange"]{ background:#F58549; color:#0A0A0A; }
.bk-tmpl[data-bg="drench-green"]{  background:#7FB236; color:#0A0A0A; }
.bk-tmpl[data-bg="drench-blue"]   .t-tagline,
.bk-tmpl[data-bg="drench-orange"] .t-tagline,
.bk-tmpl[data-bg="drench-green"]  .t-tagline{ color:inherit; opacity:.85; }
.bk-tmpl[data-bg="grid"]{
  background:
    transparent 0 0/64px 64px,
    transparent 0 0/64px 64px,
    #FAF7EC;
  color:#0A0A0A;
}

/* ── 1 · LinkedIn cover · 1584×396 ── */
#t-linkedin-cover{ width:1584px; height:396px; padding:48px 80px;
  display:flex; flex-direction:column; justify-content:center; gap:0; }
#t-linkedin-cover .t-name{ font-size:64px; line-height:1; margin-bottom:18px; max-width:1280px; }
#t-linkedin-cover .t-role{ font-family:var(--mono); font-size:18px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--zop-orange);
  margin-bottom:24px; display:flex; align-items:center; gap:10px; font-weight:700; }
#t-linkedin-cover .t-role::before{ content:''; width:14px; height:14px; background:currentColor; }
#t-linkedin-cover .t-tagline{ font-size:24px; max-width:1280px; }
#t-linkedin-cover .t-mark{ width:130px; height:130px; }

/* ── 2 · LinkedIn square post · 1080×1080 ── */
#t-linkedin-square{ width:1080px; height:1080px; padding:80px;
  display:flex; flex-direction:column; justify-content:space-between; }
#t-linkedin-square .t-eyebrow{
  font-family:var(--mono); font-size:18px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--zop-orange); font-weight:700;
  display:flex; align-items:center; gap:14px; max-width:780px;
}
#t-linkedin-square .t-eyebrow::before{ content:''; width:18px; height:18px; background:currentColor; }
#t-linkedin-square .t-name{ font-size:108px; line-height:.95; max-width:920px; }
#t-linkedin-square .t-tagline{ font-size:28px; line-height:1.4; max-width:780px; }
#t-linkedin-square .t-foot{ display:flex; justify-content:flex-end; align-items:flex-end; }
#t-linkedin-square .t-handle{ font-family:var(--mono); font-size:18px; letter-spacing:.08em; }
#t-linkedin-square .t-mark{ width:160px; height:160px; }

/* ── 3 · LinkedIn landscape post · 1200×627 ── */
#t-linkedin-landscape{ width:1200px; height:627px; padding:64px;
  display:flex; flex-direction:column; justify-content:space-between; }
#t-linkedin-landscape .t-eyebrow{
  font-family:var(--mono); font-size:14px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--zop-orange); font-weight:700;
  display:flex; align-items:center; gap:10px; max-width:1010px;
}
#t-linkedin-landscape .t-eyebrow::before{ content:''; width:14px; height:14px; background:currentColor; }
#t-linkedin-landscape .t-name{ font-size:64px; line-height:1; max-width:1010px; }
#t-linkedin-landscape .t-tagline{ font-size:21px; line-height:1.45; max-width:760px; }
#t-linkedin-landscape .t-foot{ display:flex; justify-content:flex-end; align-items:flex-end; }
#t-linkedin-landscape .t-handle{ font-family:var(--mono); font-size:14px; letter-spacing:.08em; }
#t-linkedin-landscape .t-mark{ width:110px; height:110px; }

/* ── 4 · X banner · 1500×500 ── */
#t-x-banner{ width:1500px; height:500px; padding:48px 80px;
  display:flex; flex-direction:column; justify-content:center; gap:0; }
#t-x-banner .t-name{ font-size:80px; line-height:.95; margin-bottom:20px; max-width:1200px; }
#t-x-banner .t-role{ font-family:var(--mono); font-size:18px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--zop-orange); margin-bottom:22px;
  display:flex; align-items:center; gap:10px; font-weight:700; }
#t-x-banner .t-role::before{ content:''; width:14px; height:14px; background:currentColor; }
#t-x-banner .t-tagline{ font-size:26px; max-width:1200px; }
#t-x-banner .t-mark{ width:140px; height:140px; }

/* ── 5 · X post · 1600×900 ── */
#t-x-post{ width:1600px; height:900px; padding:96px;
  display:flex; flex-direction:column; justify-content:space-between; }
#t-x-post .t-eyebrow{
  font-family:var(--mono); font-size:20px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--zop-orange); font-weight:700;

  }
  if(slide.type === 'end'){
    return `
      <div class="t-cta-eyebrow">${escHtml(slide.eyebrow || 'Ready when you are')}</div>

      <div class="t-mark">${markFor(state.subbrand)}</div>
    `;
  }
  /* content (default) */
  const bullets = Array.isArray(slide.bullets) ? slide.bullets.filter(Boolean) : [];
  return `
    <div class="cs-content-top">
      <span class="t-num">${num} / ${totalStr}</span>
      <div class="t-head">${escHtml(slide.head || '')}</div>
      <div class="t-body">${escHtml(slide.body || '')}</div>

    <div class="t-foot-num">${num} / ${totalStr}</div>

    return renderCarouselSlide(slides[i], i + 1, slides.length);
  },

function renderTemplate(){
  const t = TEMPLATES[state.template];
  /* Clear the wrap, build a new template node at native size */
  wrap.innerHTML = '';
  wrap.style.width  = (t.w * scaleFactor()) + 'px';
  wrap.style.height = (t.h * scaleFactor()) + 'px';

  const tmpl = document.createElement('div');
  tmpl.className = 'bk-tmpl';
  tmpl.id = 't-' + state.template;
  tmpl.style.width  = t.w + 'px';
  tmpl.style.height = t.h + 'px';
  tmpl.style.transform = 'scale(' + scaleFactor() + ')';
  tmpl.setAttribute('data-bg', state.bg);
  /* Brand-mark customization · size, position, padding from edge */
  tmpl.setAttribute('data-mark-size', state.markSize);
  tmpl.setAttribute('data-mark-pos',  state.markPos);
  if(state.markPad){
    tmpl.style.setProperty('--mark-pad', state.markPad + 'px');
  }
  /* Custom accent override · if a hex is set, it replaces the orange
     accent in eyebrows / role tags / stat numbers. Set as a CSS custom
     prop so all the styled elements pick it up cleanly. */
  if(state.customColor && /^#[0-9a-f]{6}$/i.test(state.customColor)){
    tmpl.style.setProperty('--zop-orange', state.customColor);
  }
  /* Background-image dim overlay strength */
  if(state.bgImageDim){
    tmpl.style.setProperty('--bg-dim', state.bgImageDim);
  }

  /* ── Build inner HTML ──
     Order: bg image (z:0) · template content (z:1 via .has-img rule) ·
            fg image (z:2) · brand mark (z:5, last in source for safety). */
  let innerHtml = '';
  if(state.bgImage){
    innerHtml += '<div class="t-bg-img" data-fit="' + state.bgImageFit + '"' +
                 ' style="background-image:url(\'' + state.bgImage + '\');' +
                 ' opacity:' + state.bgImageOpacity + ';"></div>';
  }
  innerHtml += RENDERERS[state.template]();
  if(state.fgImage){
    innerHtml += '<div class="t-fg-img" data-fg-pos="' + state.fgImagePos + '"' +
                 ' style="background-image:url(\'' + state.fgImage + '\');"></div>';
  }
  tmpl.innerHTML = innerHtml;

  /* Toggle .has-img so the stacking-context CSS rule kicks in only when
     an image is present (default templates stay untouched). */
  tmpl.classList.toggle('has-img', !!(state.bgImage || state.fgImage));

  /* Carousel · stamp the active slide's type class onto .bk-tmpl so
     the right per-slide-type layout rules fire. */
  if(isCarousel()){
    const slides = state.carouselSlides || [];
    const i = Math.max(0, Math.min(state.carouselActive || 0, slides.length - 1));
    const slide = slides[i] || { type:'cover' };
    tmpl.classList.add('cs-' + slide.type);
  }

  wrap.appendChild(tmpl);

  /* Slack avatar uses bg-* class style for clean square background */
  if(state.template === 'slack-avatar'){
    tmpl.classList.add('bg-' + (state.bg === 'ink' ? 'ink' : 'paper'));
  }

  /* Header strings */
  currentName.textContent = t.name;
  currentDim.textContent  = t.w + '×' + t.h;
}

/* Scale the template down to fit the preview area */
function scaleFactor(){
  const t = TEMPLATES[state.template];
  /* Available preview area · subtract padding */
  const stageRect = document.querySelector('.bk-preview').getBoundingClientRect();
  const padX = 64, padY = 64;
  const availW = stageRect.width  - padX;
  const availH = stageRect.height - padY;
  return Math.min(availW / t.w, availH / t.h, 1);
}

  bind('#bk-stat-label', 'statLabel');
  bind('#bk-stat-sub',   'statSub');
  bind('#bk-presenter',  'presenter');

  /* Custom color · two inputs (color picker + hex text) stay in sync */
  const colorPicker = editor.querySelector('#bk-custom-color');
  const colorHex    = editor.querySelector('#bk-custom-color-hex');
  const colorClear  = editor.querySelector('#bk-custom-color-clear');
  if(colorPicker) colorPicker.addEventListener('input', e => {
    state.customColor = e.target.value;
    if(colorHex) colorHex.value = e.target.value;
    renderTemplate();
    saveState();
  });
  if(colorHex) colorHex.addEventListener('input', e => {
    state.customColor = e.target.value.trim();
    if(colorPicker && /^#[0-9a-f]{6}$/i.test(state.customColor)) colorPicker.value = state.customColor;
    renderTemplate();
    saveState();
  });
  if(colorClear) colorClear.addEventListener('click', () => {
    state.customColor = '';
    if(colorHex) colorHex.value = '';
    renderTemplate();
    saveState();
  });

  editor.querySelectorAll('button[data-set]').forEach(b => {
    b.addEventListener('click', () => {
      state[b.dataset.set] = b.dataset.val;
      saveState();
      renderEditor();    /* re-render to update active states */
      renderTemplate();
    });
  });

  /* ── Range slider · mark padding ── */
  const padRange  = editor.querySelector('#bk-mark-pad');
  const padReadout = editor.querySelector('#bk-mark-pad-val');
  if(padRange){
    padRange.addEventListener('input', e => {
      state.markPad = +e.target.value;
      if(padReadout) padReadout.textContent = state.markPad + 'px';
      renderTemplate();
      saveState();
    });
  }

  /* ── Range sliders · bg image opacity / dim ── */
  const bgOpa    = editor.querySelector('#bk-bg-image-opacity');
  const bgOpaVal = editor.querySelector('#bk-bg-image-opacity-val');
  if(bgOpa){
    bgOpa.addEventListener('input', e => {
      state.bgImageOpacity = +e.target.value;
      if(bgOpaVal) bgOpaVal.textContent = Math.round(state.bgImageOpacity * 100) + '%';
      renderTemplate();
      saveState();
    });
  }
  const bgDim    = editor.querySelector('#bk-bg-image-dim');
  const bgDimVal = editor.querySelector('#bk-bg-image-dim-val');
  if(bgDim){
    bgDim.addEventListener('input', e => {
      state.bgImageDim = +e.target.value;
      if(bgDimVal) bgDimVal.textContent = Math.round(state.bgImageDim * 100) + '%';
      renderTemplate();
      saveState();
    });
  }

  /* ── Image uploads · FileReader → DataURL → state ── */
  function bindImageUpload(inputId, clearId, key){
    const input = editor.querySelector(inputId);
    const clear = editor.querySelector(clearId);
    if(input){
      input.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        if(file.size > 8 * 1024 * 1024){
          showToast('Image too large · keep under 8 MB');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          state[key] = reader.result;
          saveState();
          renderEditor();      /* re-render so fit / opacity / placement appear */
          renderTemplate();
        };
        reader.readAsDataURL(file);
      });
    }
    if(clear){
      clear.addEventListener('click', () => {
        state[key] = null;
        saveState();
        renderEditor();
        renderTemplate();
      });
    }
  }
  bindImageUpload('#bk-bg-image-input', '#bk-bg-image-clear', 'bgImage');
  bindImageUpload('#bk-fg-image-input', '#bk-fg-image-clear', 'fgImage');

  /* ── Carousel · slide nav (switch active / add / delete) ── */
  editor.querySelectorAll('button[data-cs-index]').forEach(b => {
    b.addEventListener('click', () => {
      state.carouselActive = +b.dataset.csIndex;
      saveState();
      renderEditor();
      renderTemplate();
    });
  });
  const csAddBtn = editor.querySelector('#cs-add');
  if(csAddBtn){
    csAddBtn.addEventListener('click', () => {
      if(state.carouselSlides.length >= 10) return;
      const newSlide = {
        type: 'content',
        head: 'New slide heading',
        body: 'Replace this with the body copy for this slide.'
      };
      state.carouselSlides.push(newSlide);
      state.carouselActive = state.carouselSlides.length - 1;
      saveState();
      renderEditor();
      renderTemplate();
    });
  }
  const csDelBtn = editor.querySelector('#cs-del');
  if(csDelBtn){
    csDelBtn.addEventListener('click', () => {
      if(state.carouselSlides.length <= 1) return;
      const i = state.carouselActive;
      state.carouselSlides.splice(i, 1);
      state.carouselActive = Math.max(0, Math.min(i, state.carouselSlides.length - 1));
      saveState();
      renderEditor();
      renderTemplate();
    });
  }
  /* ── Carousel · slide type picker (cover / content / end). Switching
     type doesn't wipe per-slide copy, so users can A/B between types. ── */
  editor.querySelectorAll('button[data-cs-set-type]').forEach(b => {
    b.addEventListener('click', () => {
      const slide = state.carouselSlides[state.carouselActive];
      if(!slide) return;
      slide.type = b.dataset.csSetType;
      saveState();
      renderEditor();
      renderTemplate();
    });
  });
  /* ── Carousel · per-slide field bindings ── */
  function bindSlide(id, key, transform){
    const el = editor.querySelector(id);
    if(!el) return;
    el.addEventListener('input', e => {
      const slide = state.carouselSlides[state.carouselActive];
      if(!slide) return;
      slide[key] = transform ? transform(e.target.value) : e.target.value;
      renderTemplate();
      saveState();
    });
  }
  bindSlide('#cs-eyebrow', 'eyebrow');
  bindSlide('#cs-name',    'name');
  bindSlide('#cs-subline', 'subline');
  bindSlide('#cs-handle',  'handle');
  bindSlide('#cs-head',    'head');
  bindSlide('#cs-body',    'body');
  bindSlide('#cs-bullets', 'bullets', v => v.split('\n').map(s => s.trim()).filter(Boolean));

  /* ── Reset everything · also wipes localStorage ── */
  const resetBtn = editor.querySelector('#bk-reset-all');
  if(resetBtn){
    resetBtn.addEventListener('click', () => {
      if(!confirm('Reset every customization back to defaults?')) return;
      Object.keys(state).forEach(k => { delete state[k]; });
      Object.assign(state, DEFAULTS);
      /* Re-clone the carousel array so reset doesn't share refs with DEFAULTS */
      state.carouselSlides = JSON.parse(JSON.stringify(DEFAULTS.carouselSlides));
      try { localStorage.removeItem('bk-state'); } catch(e){}
      renderEditor();
      renderTemplate();
      showToast('Reset to defaults');
    });
  }

}

/* ============================================================================
   STATE PERSISTENCE · the editor is a power tool. Surviving a reload is
   table stakes. We snapshot `state` to localStorage on every meaningful
   change and rehydrate on boot. Image DataURLs can balloon the payload,
   so we cap there and silently fall back if quota is hit.
   ============================================================================ */
const LS_KEY = 'bk-state-v1';
function saveState(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch(e){
    /* QuotaExceeded · very large image · drop the image fields and retry */
    try {
      const slim = Object.assign({}, state, { bgImage:null, fgImage:null });
      localStorage.setItem(LS_KEY, JSON.stringify(slim));
      console.warn('bk-state: image too large for localStorage, dropped before save');
    } catch(_e){ /* give up silently · user just loses the image on reload */ }
  }
}
function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    /* Defensive · only copy known keys, avoid stale / malicious shapes */
    Object.keys(DEFAULTS).forEach(k => {
      if(k in saved) state[k] = saved[k];
    });
  } catch(e){ /* malformed state · ignore, use defaults */ }
}

/* ============================================================================
   TEMPLATE PICKER · sidebar
   ============================================================================ */
document.querySelectorAll('.bk-tmpl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bk-tmpl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.template = btn.dataset.template;
    syncExportButtons();
    renderTemplate();
    renderEditor();
    saveState();
  });
});

/* ============================================================================
   EXPORT · render the active template at native resolution → PNG
   ============================================================================ */
function showToast(msg){
  const t = document.getElementById('bk-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================================
   CAPTURE · render the active template at native size and return a PNG
   data URL. Shared by single-template export, carousel ZIP export, and
   carousel PDF export so all three paths produce identical output.
   ============================================================================ */
async function captureActiveTemplate(){
  const tmplEl = wrap.querySelector('.bk-tmpl');
  if(!tmplEl) return null;
  const t = TEMPLATES[state.template];
  const origTransform = tmplEl.style.transform;
  const origWrapW = wrap.style.width;
  const origWrapH = wrap.style.height;
  tmplEl.style.transform = 'scale(1)';
  wrap.style.width  = t.w + 'px';
  wrap.style.height = t.h + 'px';
  try{
    return await htmlToImage.toPng(tmplEl, {
      width: t.w, height: t.h, pixelRatio: 1, cacheBust: true,
      style: { transform:'scale(1)', transformOrigin:'top left' },
    });
  } finally {
    tmplEl.style.transform = origTransform;
    wrap.style.width  = origWrapW;
    wrap.style.height = origWrapH;
  }
}

/* Capture every slide of the active carousel · used by both ZIP and PDF
   export paths. Switches state.carouselActive frame-by-frame, captures,
   then restores. Yields between renders so the browser actually paints. */
async function captureAllCarouselSlides(onProgress){
  const slides = state.carouselSlides;
  const originalActive = state.carouselActive;
  const out = [];
  for(let i = 0; i < slides.length; i++){
    state.carouselActive = i;
    renderTemplate();
    /* Two RAFs · let style + layout commit before html-to-image reads it. */
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    const dataUrl = await captureActiveTemplate();
    if(dataUrl) out.push(dataUrl);
    if(onProgress) onProgress(i + 1, slides.length);
  }
  state.carouselActive = originalActive;
  renderTemplate();
  return out;
}

exportBtn.addEventListener('click', async () => {
  const tmplEl = wrap.querySelector('.bk-tmpl');
  if(!tmplEl) return;
  exportBtn.disabled = true;
  const t = TEMPLATES[state.template];

  /* Carousel · render every slide and bundle into a ZIP (one PNG per slide).
     Single-template path stays unchanged below. */
  if(isCarousel()){
    if(typeof JSZip === 'undefined'){ showToast('JSZip not loaded'); exportBtn.disabled = false; return; }
    const total = state.carouselSlides.length;
    exportBtn.textContent = 'Rendering 0 / ' + total + '...';
    try{
      const dataUrls = await captureAllCarouselSlides((done, all) => {
        exportBtn.textContent = 'Rendering ' + done + ' / ' + all + '...';
      });
      const zip = new JSZip();
      dataUrls.forEach((dataUrl, i) => {
        const base64 = dataUrl.split(',')[1];
        const num = String(i + 1).padStart(2, '0');
        zip.file('zopdev-' + state.template + '-' + num + '.png', base64, { base64:true });
      });
      const blob = await zip.generateAsync({ type:'blob' });
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'zopdev-' + state.template + '.zip';
      link.href = url;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      showToast(total + ' slides downloaded · ZIP');
    } catch(err){
      console.error('Carousel export failed:', err);
      showToast('Export failed · check console');
    }
    exportBtn.disabled = false;
    syncExportButtons();
    return;
  }

  /* Single-template · the existing flow */
  exportBtn.textContent = 'Rendering...';
  try{
    const dataUrl = await captureActiveTemplate();
    if(dataUrl){
      const link = document.createElement('a');
      link.download = 'zopdev-' + state.template + '.png';
      link.href = dataUrl;
      link.click();
      showToast('PNG downloaded · ' + t.w + '×' + t.h);
    }
  } catch(err){
    console.error('Export failed:', err);
    showToast('Export failed · check console');
  }
  exportBtn.disabled = false;
  syncExportButtons();
});

/* ============================================================================
   PDF EXPORT · carousel only. Stitches every captured slide into a single
   multi-page PDF at native resolution. LinkedIn document posts accept PDF
   uploads, so this is the canonical "post a carousel" output.
   ============================================================================ */
const exportPdfBtn = document.getElementById('bk-export-pdf-btn');
exportPdfBtn.addEventListener('click', async () => {
  if(!isCarousel()) return;
  if(!window.jspdf || !window.jspdf.jsPDF){ showToast('jsPDF not loaded'); return; }
  exportPdfBtn.disabled = true;
  const t = TEMPLATES[state.template];
  const total = state.carouselSlides.length;
  exportPdfBtn.textContent = 'Rendering 0 / ' + total + '...';
  try{
    const dataUrls = await captureAllCarouselSlides((done, all) => {
      exportPdfBtn.textContent = 'Rendering ' + done + ' / ' + all + '...';
    });
    const orientation = t.w > t.h ? 'landscape' : 'portrait';
    const pdf = new window.jspdf.jsPDF({ orientation, unit:'px', format:[t.w, t.h] });
    dataUrls.forEach((dataUrl, i) => {
      if(i > 0) pdf.addPage([t.w, t.h], orientation);
      pdf.addImage(dataUrl, 'PNG', 0, 0, t.w, t.h);
    });
    pdf.save('zopdev-' + state.template + '.pdf');
    showToast(total + ' slides downloaded · PDF');
  } catch(err){
    console.error('PDF export failed:', err);
    showToast('PDF export failed · check console');
  }
  exportPdfBtn.disabled = false;
  syncExportButtons();
});

/* Show / hide / relabel the export buttons based on what the user is
   editing. Carousel templates get the multi-slide labels and the PDF
   button; everything else falls back to the original "Download PNG". */
function syncExportButtons(){
  if(state.template === 'press-kit'){
    exportBtn.style.display = 'none';
    exportPdfBtn.style.display = 'none';
    return;
  }
  if(isCarousel()){
    exportBtn.style.display = '';
    exportBtn.textContent = 'Download · ZIP';
    exportPdfBtn.style.display = '';
    exportPdfBtn.textContent = 'Download · PDF';
  } else {
    exportBtn.style.display = '';
    exportBtn.textContent = 'Download PNG';
    exportPdfBtn.style.display = 'none';
  }
}

/* ============================================================================
   EXPORT ALL · render every renderable template at native resolution and
   bundle the PNGs into a single ZIP. Skips slack-avatar (boring) and
   press-kit (separate per-mark downloads).
   ============================================================================ */
const exportAllBtn = document.getElementById('bk-export-all-btn');
exportAllBtn.addEventListener('click', async () => {
  /* Skip press-kit (separate per-mark downloads) AND carousels (their
     own dedicated multi-slide export buttons · including them here would
     only capture the currently-active slide of each carousel, which is
     not what "Export all" implies). */
  const exportable = Object.keys(TEMPLATES).filter(k =>
    k !== 'press-kit' && k !== 'carousel-square' && k !== 'carousel-portrait'
  );
  if(typeof JSZip === 'undefined'){ showToast('JSZip not loaded'); return; }
  exportAllBtn.disabled = true;
  exportAllBtn.textContent = 'Exporting 0 of ' + exportable.length + '...';

  const zip = new JSZip();
  const originalTemplate = state.template;

  for(let i = 0; i < exportable.length; i++){
    const key = exportable[i];
    state.template = key;
    /* Re-render the active template at native dimensions for capture */
    renderTemplate();
    /* Allow a paint tick so the new DOM is laid out */
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    const tmplEl = wrap.querySelector('.bk-tmpl');
    if(!tmplEl) continue;
    const t = TEMPLATES[key];
    const origTransform = tmplEl.style.transform;
    tmplEl.style.transform = 'scale(1)';
    const origWrapW = wrap.style.width;
    const origWrapH = wrap.style.height;
    wrap.style.width  = t.w + 'px';
    wrap.style.height = t.h + 'px';

    try{
      const dataUrl = await htmlToImage.toPng(tmplEl, {
        width:  t.w,
        height: t.h,
        pixelRatio: 1,
        cacheBust: true,
        style: { transform:'scale(1)', transformOrigin:'top left' },
      });
      const base64 = dataUrl.split(',')[1];
      zip.file('zopdev-' + key + '.png', base64, { base64:true });
    } catch(err){
      console.error('Skipped ' + key + ':', err);
    }

    tmplEl.style.transform = origTransform;
    wrap.style.width  = origWrapW;
    wrap.style.height = origWrapH;
    exportAllBtn.textContent = 'Exporting ' + (i + 1) + ' of ' + exportable.length + '...';
  }

  /* Restore active template + UI */
  state.template = originalTemplate;
  renderTemplate();

  /* Generate the ZIP and download */
  const blob = await zip.generateAsync({ type:'blob' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = 'zopdev-brand-kit.zip';
  link.href = url;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);

  exportAllBtn.disabled = false;
  exportAllBtn.textContent = 'Export all · ZIP';
  showToast(exportable.length + ' assets exported as ZIP');
});

/* ============================================================================
   PRESS KIT · per-mark SVG + PNG downloads at any size
   ============================================================================ */
const MARK_DEFS = {
  dev: {
    name: 'ZopDev',
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="SIZE" height="SIZE">
      <rect x="0"  y="0"  width="16" height="16" fill="#2A4494"/>
      <rect x="16" y="0"  width="16" height="16" fill="#F58549"/>
      <rect x="16" y="16" width="16" height="16" fill="#7FB236"/>
    </svg>`
  },
  night: {
    name: 'ZopNight',
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="SIZE" height="SIZE">
      <rect x="0" y="0" width="32" height="32" fill="#2A4494"/>
      <circle cx="16" cy="16" r="8" fill="#FFFFFF"/>
    </svg>`
  },
  day: {
    name: 'ZopDay',
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="SIZE" height="SIZE">
      <rect x="0" y="0" width="32" height="32" fill="#F58549"/>
      <circle cx="16" cy="16" r="8" fill="#FFFFFF"/>
    </svg>`
  },
  cloud: {
    name: 'ZopCloud',
    svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="SIZE" height="SIZE">
      <rect x="0" y="0" width="32" height="32" fill="#2A4494"/>
      <rect x="12" y="8"  width="8"  height="6"  fill="#FFFFFF"/>
      <rect x="6"  y="14" width="20" height="10" fill="#FFFFFF"/>
    </svg>`
  }
};

function downloadMark(key, fmt, size){
  const def = MARK_DEFS[key];
  if(!def) return;
  if(fmt === 'svg'){
    const svgStr = def.svg.replace(/SIZE/g, '512');
    const blob = new Blob([svgStr], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = 'zopdev-' + key + '.svg';
    link.href = url;
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('SVG downloaded · ' + def.name);
    return;
  }
  /* PNG · render the SVG into a canvas at the requested size */
  const svgStr = def.svg.replace(/SIZE/g, String(size));
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, size, size);
    canvas.toBlob(b => {
      const burl = URL.createObjectURL(b);
      const link = document.createElement('a');
      link.download = 'zopdev-' + key + '-' + size + '.png';
      link.href = burl;
      link.click();
      setTimeout(() => URL.revokeObjectURL(burl), 1000);
      showToast('PNG downloaded · ' + def.name + ' · ' + size + '×' + size);
    }, 'image/png');
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

/* ============================================================================
   BOOT
   ============================================================================ */
function init(){
  /* Hydrate from localStorage before anything else so the first paint
     already reflects the user's saved customizations. */
  loadState();
  /* Sync the sidebar · the active template might be different from the
     hard-coded HTML default after a reload. */
  document.querySelectorAll('.bk-tmpl-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.template === state.template);
  });
  /* Press-kit hides export buttons; carousel reveals the PDF button.
     Centralised in syncExportButtons so all routes stay in sync. */
  syncExportButtons();
  renderTemplate();
  renderEditor();
}

/* Re-scale on viewport resize so preview always fits */
let resizeTimer = null;
window.addEventListener('resize', () => {
  if(resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderTemplate, 100);
});

/* Wait one tick after fonts/SVG defs to be sure dims are accurate */
requestAnimationFrame(init);
</script>
